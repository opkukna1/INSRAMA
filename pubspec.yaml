name: ins_rama
description: "INS Rama - AI Powered Cooperative Samiti Auditor and Ledger App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # यूआई और आइकन्स के लिए
  cupertino_icons: ^1.0.8

  # बिना इंटरनेट लोकल डिवाइस में डेटा सुरक्षित रखने के लिए (SQLite)
  sqflite: ^2.3.3+2
  path: ^1.9.0

  # फोन की गैलरी/स्टोरेज से पीडीएफ बिल सेलेक्ट करने के लिए
  file_picker: ^8.1.2

  # पीडीएफ बिलों में से टेक्स्ट (लिखावट) रीड करने के लिए
  syncfusion_flutter_pdf: ^26.1.39

  # एडमिन पैनल के जेमिनी एआई मॉडल को कनेक्ट करने के लिए
  google_generative_ai: ^0.4.0

  # तारीखों और खातों को सही फॉर्मेट (जैसे ₹10,000.00) में दिखाने के लिए
  intl: ^0.19.0

  # 🔥 फिक्स 1: .env फाइल से API Key रीड करने के लिए पैकेज जोड़ा गया
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # 🔥 फिक्स 2: .env फाइल को ऐप के एसेट्स में शामिल किया गया ताकि कोड इसे लोड कर सके
  assets:
    - .env
