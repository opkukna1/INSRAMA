name: INS Rama Flutter CI/CD (Fast Auto-Fix)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Java/JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 🪄 स्टेप 1: पुराना कचरा साफ़ करके नया क्लीन एंड्रॉइड फोल्डर बनाना
      - name: Recreate Clean Android Folder
        run: |
          rm -rf android
          flutter create . --platforms=android

      # ⚡ स्टेप 2: सारे प्लगइन्स (जैसे file_picker) को ज़बरदस्ती SDK 36 पर ही बिल्ड करना
      - name: Force Android SDK 36 on All Plugins (Subprojects)
        run: |
          BUILD_GRADLE="android/build.gradle"
          FORCE_SDK_SCRIPT='\nsubprojects {\n    afterEvaluate { project ->\n        if (project.hasProperty("android")) {\n            project.android {\n                compileSdk = 36\n                defaultConfig {\n                    targetSdk = 36\n                }\n            }\n        }\n    }\n}'
          echo -e "$FORCE_SDK_SCRIPT" >> $BUILD_GRADLE

      # 🔑 एआई और स्टोरेज के लिए अनुमतियां (Permissions) जोड़ना
      - name: Inject Internet Permissions for Gemini AI
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          PERMISSIONS='    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />'
          sed -i "s|<manifest[^>]*>|&\n$PERMISSIONS|" $MANIFEST_PATH

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Flutter code
        run: flutter analyze

      - name: Build Android APK
        run: flutter build apk --release

      # 📦 स्टेप 3 (फ़िक्स पाथ): यह बदले हुए नए पाथ से APK फाइल को उठाकर आपको डाउनलोड लिंक देगा
      - name: Upload Build Artifact (APK)
        uses: actions/upload-artifact@v4
        with:
          name: ins-rama-release-apk
          path: build/app/outputs/apk/release/*.apk
