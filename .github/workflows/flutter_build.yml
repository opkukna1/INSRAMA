name: INS Rama Flutter CI/CD (Fast Auto-Fix)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Java/JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 🪄 स्टेप 1: सर्वर पर बिल्कुल नया क्लीन एंड्रॉइड फोल्डर तैयार करना
      - name: Recreate Clean Android Folder
        run: |
          rm -rf android
          flutter create . --platforms=android

      # ⚡ स्टेप 2 (महा-फ़िक्स): यह कमांड .gradle और .gradle.kts दोनों फॉर्मेट में compileSdk/targetSdk को 36 कर देगी
      - name: Force Android SDK 36 for file_picker (All Formats)
        run: |
          # Groovy (.gradle) फ़ॉर्मेट के लिए फ़िक्स
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/compileSdk = .*/compileSdk = 36/g' android/app/build.gradle || true
            sed -i 's/compileSdk flutter.*/compileSdk 36/g' android/app/build.gradle || true
            sed -i 's/targetSdk = .*/targetSdk = 36/g' android/app/build.gradle || true
            sed -i 's/targetSdk flutter.*/targetSdk 36/g' android/app/build.gradle || true
          fi
          
          # Kotlin DSL (.gradle.kts) फ़ॉर्मेट के लिए फ़िक्स
          if [ -f "android/app/build.gradle.kts" ]; then
            sed -i 's/compileSdk = .*/compileSdk = 36/g' android/app/build.gradle.kts || true
            sed -i 's/targetSdk = .*/targetSdk = 36/g' android/app/build.gradle.kts || true
          fi

      # 🔑 एआई और स्टोरेज के लिए अनुमतियां (Permissions) जोड़ना
      - name: Inject Internet Permissions for Gemini AI
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          PERMISSIONS='    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />'
          sed -i "s|<manifest[^>]*>|&\n$PERMISSIONS|" $MANIFEST_PATH

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Flutter code
        run: flutter analyze

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Build Artifact (APK)
        uses: actions/upload-artifact@v4
        with:
          name: ins-rama-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
