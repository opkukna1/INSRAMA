name: INS Rama Flutter CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Java/JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 🪄 1. पुरानी v1 Embedding की बीमारी जड़ से खत्म करने के लिए नया फ़ोल्डर बनाना
      - name: Recreate Clean Android Folder
        run: |
          rm -rf android
          flutter create --platforms=android .

      # 🔑 2. एआई और स्टोरेज के लिए इंटरनेट परमिशन जोड़ना
      - name: Inject Internet Permissions
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          PERMISSIONS='    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />'
          sed -i "s|<manifest[^>]*>|&\n$PERMISSIONS|" $MANIFEST_PATH

      # ⚡ 3. ऐप का डिफ़ॉल्ट वर्शन 36 करना
      - name: Update App SDK to 36
        run: |
          echo "flutter.compileSdkVersion=36" >> android/local.properties
          echo "flutter.targetSdkVersion=36" >> android/local.properties

      - name: Install dependencies
        run: flutter pub get

      # 🚀 4. मास्टर स्ट्रोक: डाउनलोड हुए file_picker प्लगइन के सोर्स कोड में ही घुसकर वर्शन 36 कर देना (बिना Gradle को छेड़े)
      - name: Patch file_picker and all Plugins to SDK 36
        run: |
          echo "Patching downloaded plugins to compileSdk 36..."
          find ~/.pub-cache /opt/hostedtoolcache/flutter -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) -exec sed -i -E 's/compileSdk(Version)?[[:space:]]+[0-9]+/compileSdk\1 36/g' {} + 2>/dev/null || true
          find ~/.pub-cache /opt/hostedtoolcache/flutter -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) -exec sed -i -E 's/compileSdk(Version)?[[:space:]]*=[[:space:]]*[0-9]+/compileSdk\1 = 36/g' {} + 2>/dev/null || true

      - name: Analyze Flutter code
        run: flutter analyze || true

      - name: Build Android APK
        run: flutter build apk --release

      # 📦 5. सुपर-सर्च: APK चाहे जिस भी फोल्डर में बने, यह उसे ढूँढ कर निकाल लेगा
      - name: Upload Build Artifact (APK)
        uses: actions/upload-artifact@v4
        with:
          name: ins-rama-release-apk
          path: build/app/outputs/**/*.apk
