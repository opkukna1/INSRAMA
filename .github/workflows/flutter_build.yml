name: INS Rama Flutter CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Java/JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ⚡ सुरक्षित फिक्स: बिना कोई एंड्रॉइड फोल्डर डिलीट किए सिर्फ वर्शन को 36 पर अपडेट करना
      - name: Update SDK to 36 for file_picker
        run: |
          FILE="android/app/build.gradle"
          if [ -f "$FILE" ]; then
            sed -i -E 's/compileSdkVersion[[:space:]]+.*/compileSdkVersion 36/' $FILE
            sed -i -E 's/compileSdk[[:space:]]+.*/compileSdk 36/' $FILE
            sed -i -E 's/targetSdkVersion[[:space:]]+.*/targetSdkVersion 36/' $FILE
            sed -i -E 's/targetSdk[[:space:]]+.*/targetSdk 36/' $FILE
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Flutter code
        run: flutter analyze

      - name: Build Android APK
        run: flutter build apk --release

      # 📦 ओरिजिनल सही पाथ से APK उठाना
      - name: Upload Build Artifact (APK)
        uses: actions/upload-artifact@v4
        with:
          name: ins-rama-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
