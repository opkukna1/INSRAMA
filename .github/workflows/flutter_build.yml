name: INS Rama Flutter CI/CD

# यह तय करता है कि वर्कफ्लो कब रन होगा (Push या Pull Request पर)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # यह जॉब गिटहब के क्लाउड (Ubuntu Linux) पर चलेगी
    runs-on: ubuntu-latest

    steps:
      # 1. गिटहब रिपॉजिटरी से कोड को क्लाउड पर लाना
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. जावा एनवायरनमेंट (JDK 17) सेटअप करना (Android Build के लिए ज़रूरी है)
      - name: Set up Java/JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # या 'temurin' का उपयोग कर सकते हैं
          java-version: '17'

      # 3. फ़्लटर (Flutter) का लेटेस्ट स्टेबल एनवायरनमेंट सेटअप करना
      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # स्टेबल चैनल का उपयोग करें
          # आप चाहें तो यहाँ फिक्स वर्शन भी डाल सकते हैं, जैसे: flutter-version: '3.22.x'

      # 4. pubspec.yaml की सभी डिपेंडेंसीज (Gemini, Sqflite, आदि) डाउनलोड करना
      - name: Install dependencies
        run: flutter pub get

      # 5. कोड फॉर्मेटिंग और स्टेटिक एनालिसिस की जांच करना (ताकि कोड में गलतियाँ न हों)
      - name: Analyze Flutter code
        run: flutter analyze

      # 6. अगर आपके प्रोजेक्ट में यूनिट टेस्ट लिखे हैं तो उन्हें रन करना
      - name: Run Flutter tests
        run: flutter test

      # 7. एंड्रॉइड APK (Release Version) बिल्ड करना
      - name: Build Android APK
        run: flutter build apk --release

      # 8. तैयार हुए APK को गिटहब पर 'Artifact' के रूप में अपलोड करना (ताकि आप इसे डाउनलोड कर सकें)
      - name: Upload Build Artifact (APK)
        uses: actions/upload-artifact@v4
        with:
          name: ins-rama-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
